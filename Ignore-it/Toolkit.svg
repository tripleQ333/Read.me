  <text x="855" y="259" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#00ff41" letter-spacing="2">C FOR EXPLOITATION</text>

  <text x="770" y="289" font-family="'Courier New', monospace" font-size="10" fill="#00ff41" opacity="0.7">gets(buf); // :)</text>
