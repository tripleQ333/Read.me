  <text x="80" y="161" font-family="'Courier New', monospace" font-size="10" fill="#00ff41" opacity="0.5">&gt; Register inspection</text>
  <text x="80" y="179" font-family="'Courier New', monospace" font-size="10" fill="#00ff41" opacity="0.5">&gt; Stack visualization</text>
