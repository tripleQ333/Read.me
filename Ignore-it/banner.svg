<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050a05;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00ff41;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00ff41;stop-opacity:0" />
    </linearGradient>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#00ff41" stroke-width="0.3" opacity="0.06">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
    <line x1="1100" y1="0" x2="1100" y2="300"/>
  </g>

  <!-- Glow band center -->
  <rect width="1200" height="300" fill="url(#glow)" opacity="0.5"/>

  <!-- Left decorative bracket -->
  <g stroke="#00ff41" stroke-width="1.5" fill="none" opacity="0.5">
    <polyline points="60,60 40,60 40,240 60,240"/>
  </g>

  <!-- Right decorative bracket -->
  <g stroke="#00ff41" stroke-width="1.5" fill="none" opacity="0.5">
    <polyline points="1140,60 1160,60 1160,240 1140,240"/>
  </g>

  <!-- Top horizontal accent line -->
  <line x1="80" y1="72" x2="1120" y2="72" stroke="#00ff41" stroke-width="0.5" opacity="0.25"/>
  <!-- Bottom horizontal accent line -->
  <line x1="80" y1="228" x2="1120" y2="228" stroke="#00ff41" stroke-width="0.5" opacity="0.25"/>

  <!-- Floating binary rain (left side) -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#00ff41" opacity="0.08">
    <text x="75" y="90">01001000</text>
    <text x="75" y="108">11010010</text>
    <text x="75" y="126">00101101</text>
    <text x="75" y="144">10110100</text>
    <text x="75" y="162">01001000</text>
    <text x="75" y="180">11010010</text>
    <text x="75" y="198">00101101</text>
    <text x="75" y="216">10110100</text>
  </g>

  <!-- Floating binary rain (right side) -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#00ff41" opacity="0.08">
    <text x="1050" y="90">11001010</text>
    <text x="1050" y="108">00110101</text>
    <text x="1050" y="126">10100110</text>
    <text x="1050" y="144">01011001</text>
    <text x="1050" y="162">11001010</text>
    <text x="1050" y="180">00110101</text>
    <text x="1050" y="198">10100110</text>
    <text x="1050" y="216">01011001</text>
  </g>

  <!-- Terminal prompt prefix -->
  <text x="600" y="108" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#00ff41" opacity="0.6" filter="url(#subtleglow)">root@qqq:~$</text>

  <!-- Main name -->
  <text x="600" y="175" text-anchor="middle" font-family="'Courier New', monospace" font-size="50" font-weight="bold" fill="#00ff41" filter="url(#textglow)" letter-spacing="18">QQQ</text>


  <!-- Subtitle -->
  <text x="600" y="207" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#00ff41" opacity="0.7" letter-spacing="4">EXPLOIT DEVELOPER  ·  OFFENSIVE SECURITY  ·  REVERSE ENGINEER</text>

  <!-- Bottom tagline -->
  <text x="600" y="248" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#00ff41" opacity="0.4" letter-spacing="2">"if it crashes, i'm interested"</text>

  <!-- Corner accents -->
  <g stroke="#00ff41" stroke-width="1" fill="none" opacity="0.35">
    <polyline points="40,40 40,20 60,20"/>
    <polyline points="1160,40 1160,20 1140,20"/>
    <polyline points="40,260 40,280 60,280"/>
    <polyline points="1160,260 1160,280 1140,280"/>
  </g>

  <!-- Scan line effect (subtle horizontal lines) -->
  <g opacity="0.025">
    <rect x="0" y="0" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="3" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="6" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="9" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="12" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="15" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="18" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="21" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="24" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="27" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="30" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="60" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="90" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="120" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="150" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="180" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="210" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="240" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="270" width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="300" width="1200" height="1" fill="#00ff41"/>
  </g>
</svg>